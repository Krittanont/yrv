<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div id="overlay" onclick="closeDrawer()"></div>
 
<!-- ══════════════════════════════════
     HEADER
══════════════════════════════════ -->
<header id="site-header">
 
  <!-- Logo row: hidden at top, slides in after scroll (desktop) -->
  <div id="header-logo-row">
    <a href="index.html" class="header-logo">
      <span class="logo-text">YRV</span>
    </a>
  </div>
  <!-- Nav row -->
  <div id="header-nav-row">
 
    <!-- Desktop nav -->
    <nav id="desktop-nav">
      <a href="#">New Arrivals</a>
      <div class="sep"></div>
      <a href="#">seasons</a>
      <div class="sep"></div>
      <a href="#">Fashion</a>
      <div class="sep"></div>
      <a href="#">Souvenirs</a>
      <div class="sep"></div>
      <a href="#">Collections</a>
      <div class="sep"></div>
      <a href="#">explore</a>
    </nav>
 
    <!-- Mobile logo (always shown on small screens) -->
    <a href="#" id="mobile-logo" class="header-logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1" fill="rgba(178,207,207,0.9)"/>
          <rect x="9" y="1" width="6" height="6" rx="1" fill="rgba(178,207,207,0.38)"/>
          <rect x="1" y="9" width="6" height="6" rx="1" fill="rgba(178,207,207,0.38)"/>
          <rect x="9" y="9" width="6" height="6" rx="1" fill="rgba(178,207,207,0.9)"/>
        </svg>
      </div>
      <span class="logo-text">TCS <b>Faculty</b></span>
    </a>
 
  </div>
 
  <!-- Hamburger (mobile) -->
  <button id="menu-toggle" aria-label="เปิดเมนู" onclick="toggleDrawer()">
    <span class="bar b1"></span>
    <span class="bar b2"></span>
    <span class="bar b3"></span>
  </button>
 
</header>
 
<!-- ══════════════════════════════════
     MOBILE DRAWER
══════════════════════════════════ -->
<div id="drawer" aria-hidden="true">
 
  <!-- Search -->
  <div class="drawer-search">
    <svg class="ico-search" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="5.8" cy="5.8" r="4.3" stroke="rgba(0,0,0)" stroke-width="1.2"/>
      <line x1="9.2" y1="9.2" x2="12.5" y2="12.5" stroke="rgba(0,0,0)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <input type="search" placeholder="search" aria-label="ค้นหา">
  </div>
 
  <!-- Links -->
  <nav>
    <a href="#">New Arrivals</a>
    <a href="#">seasons</a>
    <a href="#">Souvenirs</a>
    <a href="#">Collections</a>
    <a href="#">Fashion</a>
    <a href="#">explore</a>
  </nav>
 
</div>
 
<script>
  const header  = document.getElementById('site-header');
  const toggle  = document.getElementById('menu-toggle');
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
 
  /* scroll: transparent → frosted glass + logo reveal */
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 0);
  }, { passive: true });
 
  function toggleDrawer() {
    drawer.classList.contains('open') ? closeDrawer() : openDrawer();
  }
 
  function openDrawer() {
    toggle.classList.add('open');
    drawer.classList.add('open');
    overlay.classList.add('visible');
    drawer.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
 
  function closeDrawer() {
    toggle.classList.remove('open');
    drawer.classList.remove('open');
    overlay.classList.remove('visible');
    drawer.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
 
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>
    
<section class="video-section">

  <!-- Video Background -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="resources/dior.mp4" type="video/mp4">
  </video>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Content (กลางจอ) -->
  <div class="content">
    <h1>YRV</h1>
    <p>THAMMASAT OFFICIAL STORE</p>
  </div>

</section>

<section class="fade">

  <section class="merch">
    <div class="type fs-1">Collections</div>
  
      <div class="grid">
  
    <a class="item" href="#">
      <img src="resources/73.jpeg" alt="สินค้า 1">
      <div class="item-label display-3"><span>74th</span></div>
    </a>
  
    <a class="item" href="#">
      <img src="resources/74.2.jpg" alt="สินค้า 2">
      <div class="item-label display-3"><span>75th</span></div>
    </a>
  
    <a class="item" href="#">
      <img src="resources/se.jpeg" alt="สินค้า 3">
      <div class="item-label display-3"><span>76th</span></div>
    </a>
  
    <a class="item" href="#">
      <img src="resources/tu.jpg" alt="สินค้า 4">
      <div class="item-label display-3"><span>spacial edition</span></div>
    </a>
  
  </div>
  </section>
  
  <section class="parallax">
    <img
      class="parallax-img"
      src="resources/pro.jpg"
      alt="parallax image"
    >
    <div class="parallax-text display-1">
      <span>YRV<br><p>Wear Your Spirit</p></span>
  </section>
  
  <section class="sec3">
    <div class="type fs-1">NEW ARRIVALS</div>
  </section>
  
  <script>
    const img = document.querySelector('.parallax-img');
  
    function onScroll() {
      const scrollY = window.scrollY;
      img.style.transform = `translateY(${scrollY * 0.4}px)`;
    }
  
    window.addEventListener('scroll', onScroll, { passive: true });
  </script>
</section>

</body>
</html>
